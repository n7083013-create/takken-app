            if (v) attribution[k] = v;

            attribution.captured_at = new Date().toISOString();
            attribution.landing_page = window.location.pathname + window.location.search;
            var expiresAt = Date.now() + 90 * 24 * 60 * 60 * 1000;
            var payload = JSON.stringify({ data: attribution, expires_at: expiresAt });
            localStorage.setItem('takken_ad_attribution', payload);
